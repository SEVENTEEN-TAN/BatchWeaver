spring:
  application:
    name: batch-scheduler
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

# MyBatis-Flex 多数据源配置
mybatis-flex:
  datasource:
    # DB1: Primary (Spring Batch 元数据 + 业务数据)
    db1:
      type: hikari
      url: jdbc:sqlserver://124.223.172.114:1433;databaseName=BatchWeaverDB;encrypt=true;trustServerCertificate=true
      username: sa
      password: YourStrong!Passw0rd
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
      pool-name: HikariPool-DB1
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

    # DB2: Business Only
    db2:
      type: hikari
      url: jdbc:sqlserver://124.223.172.114:1433;databaseName=DB2_Business;encrypt=true;trustServerCertificate=true
      username: sa
      password: YourStrong!Passw0rd
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
      pool-name: HikariPool-DB2
      maximum-pool-size: 5
      minimum-idle: 1
      connection-test-query: SELECT 1

    # DB3: Business Only
    db3:
      type: hikari
      url: jdbc:sqlserver://124.223.172.114:1433;databaseName=DB3_Business;encrypt=true;trustServerCertificate=true
      username: sa
      password: YourStrong!Passw0rd
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
      pool-name: HikariPool-DB3
      maximum-pool-size: 5
      minimum-idle: 1
      connection-test-query: SELECT 1

    # DB4: Business Only
    db4:
      type: hikari
      url: jdbc:sqlserver://124.223.172.114:1433;databaseName=DB4_Business;encrypt=true;trustServerCertificate=true
      username: sa
      password: YourStrong!Passw0rd
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
      pool-name: HikariPool-DB4
      maximum-pool-size: 5
      minimum-idle: 1
      connection-test-query: SELECT 1

  # MyBatis-Flex 全局配置
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.batch.infrastructure.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    print-banner: false

logging:
  level:
    root: INFO
    com.example.batch: DEBUG
    org.springframework.batch: INFO
    com.zaxxer.hikari: INFO          # HikariCP 日志
